name: pr-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter '@app/types' build
      - run: pnpm typecheck
      - run: pnpm format:check
      - run: pnpm audit --audit-level=high || true # warning-only for now

  test-api:
    name: api tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://app:app@localhost:5432/app_test?schema=public
      JWT_SECRET: test-secret-test-secret-test-secret-test
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter '@app/types' build
      - name: Prisma migrate deploy
        working-directory: apps/api
        run: |
          pnpm prisma generate
          pnpm prisma migrate deploy || pnpm prisma db push --skip-generate
      - name: Run API tests
        working-directory: apps/api
        run: pnpm test
